name: Deploy Vite React App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - uses: actions/checkout@v4

      # 2️⃣ Настраиваем Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Устанавливаем зависимости
      - run: npm ci
        name: Install dependencies

      # 4️⃣ Сборка проекта
      - run: npm run build
        name: Build project

      # 5️⃣ Настройка Git для Actions
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        name: Configure Git

      # 6️⃣ Деплой на GitHub Pages
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.Mars_ }}   # <- используем секрет, полный токен с github_pat_…
          publish_dir: ./dist
          force_orphan: true
